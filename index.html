<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>KAITO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f0c29">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="logo.png" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- === LOADING SCREEN === -->
<div id="loadingScreen" style="display: flex; height: 100vh; width: 100vw; align-items: center; justify-content: center; flex-direction: column;">
  <img src="logo.png" alt="Logo" class="logo-img" style="width: 80px; height: 80px; border-radius: 20px; animation: pulse 1.5s infinite;">
  <div style="margin-top: 15px; font-family: var(--font-head); font-weight: 800; font-size: 1.5rem; letter-spacing: 2px;">KAITO</div>
</div>

<style>
@keyframes pulse {
  0% { transform: scale(0.95); opacity: 0.8; }
  50% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(0.95); opacity: 0.8; }
}
</style>

<!-- === AUTH SCREEN === -->
<div id="authScreen" class="auth-wrapper" style="display: none;">
  <div class="auth-card">
    <div class="brand auth-brand">
      <img src="logo.png" alt="Logo" class="logo-img">
      <div class="logo-text">KAITO</div>
    </div>
    
    <div class="auth-tabs">
      <button id="btnTabLogin" class="auth-tab-btn active">Đăng Nhập</button>
      <button id="btnTabRegister" class="auth-tab-btn">Đăng Ký</button>
    </div>
    <form id="authForm" class="auth-form">
      <div class="field-group full">
        <label>Tên đăng nhập</label>
        <input type="text" id="authUsername" placeholder="Ví dụ: dinhtan" required autocomplete="off">
      </div>
      <div class="field-group full">
        <label>Mật khẩu</label>
        <input type="password" id="authPassword" placeholder="Nhập mật khẩu..." required>
      </div>
      
      <button type="submit" id="btnAuthSubmit" class="btn-primary" style="width: 100%; margin-top: 10px;">Đăng Nhập</button>
    </form>
  </div>
</div>

<div class="app-container" id="mainApp" style="display: none;">
  
  <header class="header-panel">
    <div class="brand">
      <img src="logo.png" alt="Logo" class="logo-img">
    </div>
    <div class="header-actions">
      <button id="btnRescue" class="btn-icon" style="color: #ffaa00;" title="Cứu hộ data"><i class="fa-solid fa-life-ring"></i></button>
      <button id="btnSettings" class="btn-icon"><i class="fa-solid fa-sliders"></i></button>
      <button id="btnExport" class="btn-icon"><i class="fa-solid fa-file-csv"></i></button>
      <button id="btnLogout" class="btn-icon" style="color: #ff4d4f;"><i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
  </header>

  <div class="tabs-nav">
    <button class="tab-btn active" data-target="tab-diary"><i class="fa-solid fa-book"></i> Nhật Ký</button>
    <button class="tab-btn" data-target="tab-schedule"><i class="fa-solid fa-calendar-days"></i> Lịch Làm</button>
  </div>

  <div id="tab-diary" class="tab-content active">
    <div class="month-selector">
    <button id="btnPrevMonth" class="btn-icon-small"><i class="fa-solid fa-chevron-left"></i></button>
    <h3 id="lblCurrentMonth">Tháng 6/2026</h3>
    <button id="btnNextMonth" class="btn-icon-small"><i class="fa-solid fa-chevron-right"></i></button>
  </div>

  <section class="stats-grid">
    <!-- Card 1: Giờ làm -->
    <div class="stat-card bento-hours">
      <div class="stat-label">Giờ làm</div>
      <div class="ring-center">
        <div class="progress-wrapper">
          <svg class="progress-ring" viewBox="0 0 80 80">
            <circle class="ring-bg" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"></circle>
            <circle class="ring-val" stroke-width="6" fill="transparent" r="34" cx="40" cy="40" id="progressCircle"></circle>
          </svg>
          <div class="ring-text">
            <span id="monthHours">0</span>
            <small>HRS</small>
          </div>
        </div>
      </div>
    </div>

    <!-- Card 2: Số công -->
    <div class="stat-card bento-days">
      <div class="stat-label">Số công</div>
      <div class="ring-center">
        <div class="progress-wrapper">
          <svg class="progress-ring" viewBox="0 0 80 80">
            <circle class="ring-bg" stroke-width="6" fill="transparent" r="34" cx="40" cy="40"></circle>
            <circle class="ring-val ring-val-days" stroke-width="6" fill="transparent" r="34" cx="40" cy="40" id="progressDaysCircle"></circle>
          </svg>
          <div class="ring-text">
            <span id="monthDays">0</span>
            <small>/27</small>
          </div>
        </div>
      </div>
      <div class="mascot-mini" id="mascotText">Cố lên!</div>
    </div>

    <!-- Card 3: Thu nhập -->
    <div class="stat-card bento-money">
      <div class="stat-label-row">
        <div class="stat-label">Thu nhập</div>
        <button id="btnTogglePrivacy" class="btn-eye" title="Ẩn/Hiện số tiền">
          <i class="fa-solid fa-eye-slash"></i>
        </button>
      </div>
      <span class="value money-text" id="monthMoney">******</span>
      <span class="sub-text" id="totalMoney">Tổng: ******</span>
    </div>
  </section>
  
  <main id="timeline" class="timeline-list">
      <div id="skeletonLoader">
         <div class="skeleton-card"></div>
         <div class="skeleton-card"></div>
      </div>
    </main>

    <button id="fab" class="fab-main"><i class="fa-solid fa-plus"></i></button>
  </div>

  <div id="tab-schedule" class="tab-content">
    <div class="schedule-header">
      <h3>Lịch trình sắp tới</h3>
      <p style="color:var(--text-muted); font-size: 0.9rem;">Những ca làm chưa hoàn thành</p>
    </div>
    
    <main id="schedule-timeline" class="timeline-list">
      <!-- Schedule items will be rendered here -->
    </main>

    <button id="fab-schedule" class="fab-main"><i class="fa-solid fa-plus"></i></button>
  </div>

</div>

<div id="logModal" class="modal-backdrop hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modalTitle">Ca làm việc mới</h3>
      <button id="btnCloseTop" class="btn-close"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">

        <div class="field-group full">
    <label>Ngày làm</label>
    <input type="date" id="workDate">
  </div>

      <div class="field-group full">

  <div class="shift-grid" id="shiftGrid">
    <!-- Nút ca làm sẽ được render bằng JS -->
  </div>

  <div id="customShift" style="display:none; margin-top:15px;">

  <div class="field-group">
    <label>Bắt đầu</label>
    <input type="time" id="customStart">
  </div>

  <div class="field-group">
    <label>Kết thúc</label>
    <input type="time" id="customEnd">
  </div>
  
  <div class="field-group" style="display: flex; align-items: center; gap: 8px; margin-bottom: 0;">
    <input type="checkbox" id="chkSavePreset" style="width: auto; margin: 0; padding: 0;">
    <label for="chkSavePreset" style="margin: 0; text-transform: none; font-size: 0.85rem; color: var(--accent);">Ghi nhớ ca này làm mẫu</label>
  </div>

</div>

</div>
      <div class="field-group full">
        <label>Ghi chú</label> <input type="text" id="inpNote" placeholder="Tên công việc...">
      </div>
    </div>
    <div class="modal-footer">
      <button id="btnCancel" class="btn-ghost">Hủy</button>
      <button id="btnSave" class="btn-primary">Lưu lại</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script type="module" src="app.js"></script>
</body>
</html>
